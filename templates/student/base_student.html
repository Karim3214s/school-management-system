<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- OPTIONAL GLOBAL CSS -->
    {% block styles %}{% endblock %}
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="{{ url_for('student.dashboard') }}">
            Student Portal
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#studentNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-between" id="studentNav">

            <!-- LEFT -->
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'student.dashboard' %}active{% endif %}"
                       href="{{ url_for('student.dashboard') }}">
                        Dashboard
                    </a>
                </li>
            </ul>

            <!-- RIGHT -->
            <ul class="navbar-nav">

                <li class="nav-item">
                    <span class="nav-link text-white">
                        👋 {{ student.user.name }}
                    </span>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold"
                       href="{{ url_for('auth.logout') }}">
                        Logout
                    </a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ ADD THIS (IMPORTANT) -->
{% block scripts %}{% endblock %}

</body>
</html>
