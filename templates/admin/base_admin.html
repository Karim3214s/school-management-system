<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - School Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* Sidebar links */
        .nav-link {
            border-radius: 8px;
            margin-bottom: 6px;
            padding: 10px 12px;
            transition: 0.3s;
            font-size: 15px;
        }

        /* Hover */
        .nav-link:hover {
            background-color: #198754;
            color: white !important;
            transform: translateX(3px);
        }

        /* Active */
        .nav-link.fw-bold {
            background-color: #198754;
            color: white !important;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        /* Sidebar title */
        h4 {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Navbar */
        .navbar {
            border-bottom: 1px solid #e5e7eb;
        }

        /* Page background */
        body {
            background-color: #f8fafc;
        }

        /* Card global (for all admin pages automatically) */
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="d-flex">

        <!-- Sidebar -->
        <div class="bg-dark text-white p-3 vh-100 position-fixed" style="width: 250px;">
            <h4 class="mb-4">
                <i class="bi bi-mortarboard-fill"></i> Admin Panel
            </h4>

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a href="{{ url_for('admin.dashboard') }}"
                        class="nav-link text-white {% if request.endpoint == 'admin.dashboard' %}fw-bold{% endif %}">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.manage_teachers') }}"
                        class="nav-link text-white {% if request.endpoint == 'admin.manage_teachers' %}fw-bold{% endif %}">
                        <i class="bi bi-person-badge me-2"></i> Manage Teachers
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.manage_students') }}"
                        class="nav-link text-white {% if request.endpoint == 'admin.manage_students' %}fw-bold{% endif %}">
                        <i class="bi bi-people me-2"></i> Manage Students
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.manage_classes') }}"
                        class="nav-link text-white {% if request.endpoint == 'admin.manage_classes' %}fw-bold{% endif %}">
                        <i class="bi bi-building me-2"></i> Manage Classes
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.manage_subjects') }}"
                        class="nav-link text-white {% if request.endpoint == 'admin.manage_subjects' %}fw-bold{% endif %}">
                        <i class="bi bi-book me-2"></i> Manage Subjects
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.assign_teachers') }}"
                        class="nav-link text-white {% if request.endpoint == 'admin.assign_teachers' %}fw-bold{% endif %}">
                        <i class="bi bi-diagram-3 me-2"></i> Assign Teachers
                    </a>
                </li>

            </ul>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1" style="margin-left: 250px;">

            <!-- Top Navbar -->
            <nav class="navbar navbar-light bg-white shadow-sm px-4">
                <span class="navbar-brand mb-0 h5">
                    {% block page_title %}Dashboard{% endblock %}
                </span>

                <div>
                    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </div>
            </nav>

            <!-- Page Content -->
            <div class="p-4">
                {% block content %}{% endblock %}
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/admin_logic.js') }}"></script>

    {% block scripts %}{% endblock %}

</body>

</html>
